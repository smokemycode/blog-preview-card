<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
    <title>Frontend Mentor | Blog preview card</title>

    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body>
    <div class= "card">
      <div class=" "card__image">
        <img src="./assets/images/illustration-article.svg" alt="Blog Image Preview that links to the blog post">
      </div>
      <div class="card__content">
        <button class="blog__section">Learning</button>
        <p class="blog__date">Published 21 Dec 2023</p>
        <h1 class="blog__title">HTML & CSS foundations</h1>
        <p class="blog__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        <img class="blog__author-image" src="./assets/images/image-avatar.webp" alt="Author's profile picture">
        <p class="blog__author">Greg Hooper</p>
      </div>
    </div>
    
  
    <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
